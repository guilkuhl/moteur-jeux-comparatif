<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Lab — Comparateur</title>
<style>
  :root {
    --bg: #0f0f13; --surface: #1a1a24; --surface2: #22222f;
    --border: #2e2e42; --accent: #7c6fef; --accent2: #ef6fba;
    --text: #e2e2f0; --muted: #888899; --green: #6fef9e;
    --radius: 10px; --font: 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 20px; display: flex; align-items: center; gap: 16px;
    height: 48px; flex-shrink: 0;
  }
  .badge { background: var(--accent); color: #fff; border-radius: 20px; padding: 2px 10px; font-size: .75rem; font-weight: 600; white-space: nowrap; }
  .topbar h1 { font-size: 1rem; font-weight: 700; white-space: nowrap; }
  #header-info { font-size: .78rem; color: var(--muted); white-space: nowrap; }

  /* ── LAYOUT PRINCIPAL ── */
  .main-layout { flex: 1; display: flex; overflow: hidden; }

  /* ── SIDEBAR IMAGES ── */
  .sidebar {
    width: 220px; min-width: 180px; flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header {
    padding: 10px 14px; font-size: .68rem; text-transform: uppercase;
    letter-spacing: .8px; color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  .sidebar-count { color: var(--accent); font-weight: 700; }
  .sidebar-list { overflow-y: auto; flex: 1; }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .img-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; cursor: pointer;
    border-bottom: 1px solid var(--border);
    border-left: 3px solid transparent;
    transition: background .12s, border-color .12s;
  }
  .img-item:hover { background: var(--surface2); }
  .img-item.active { background: var(--surface2); border-left-color: var(--accent); }
  .img-item img { width: 38px; height: 38px; object-fit: cover; border-radius: 5px; image-rendering: pixelated; flex-shrink: 0; border: 1px solid var(--border); }
  .img-item .item-info { flex: 1; min-width: 0; }
  .img-item .item-name { font-size: .8rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .img-item .item-meta { font-size: .68rem; color: var(--muted); margin-top: 2px; }

  /* ── CONTENT ── */
  .content { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 14px; }

  /* ── COMPARE SLIDER ── */
  .compare-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .compare-header {
    padding: 8px 12px; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .compare-header label { font-size: .75rem; color: var(--muted); }
  .clabel { font-size: .8rem; font-weight: 700; }

  /* Zone zoom + divider */
  .compare-body { position: relative; overflow: hidden; user-select: none; min-height: 80px; }
  /* cmp-zoom-layer : position relative pour que img-base définisse la hauteur du body */
  .cmp-zoom-layer {
    position: relative;
    transform-origin: center center;
    will-change: transform;
    line-height: 0;
    transition: transform 0.12s ease-out;
  }
  .compare-body .img-base {
    display: block; width: 100%; image-rendering: pixelated;
    pointer-events: none;
  }
  .compare-body .img-overlay {
    position: absolute; top: 0; left: 0; height: 100%; overflow: hidden;
  }
  .compare-body .img-overlay img {
    position: absolute; top: 0; left: 0; height: 100%; image-rendering: pixelated;
    pointer-events: none;
  }
  .compare-divider {
    position: absolute; top: 0; bottom: 0; width: 3px;
    background: #fff; box-shadow: 0 0 8px rgba(0,0,0,.6);
    z-index: 100; cursor: ew-resize; /* au-dessus du zoom layer */
  }
  .compare-handle {
    position: absolute; top: 50%; transform: translate(-50%,-50%);
    width: 28px; height: 28px; border-radius: 50%; background: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.4); font-size: .8rem; color: #333;
  }

  /* Boutons zoom dans le footer */
  .compare-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 12px; font-size: .72rem; color: var(--muted);
    border-top: 1px solid var(--border); gap: 8px;
  }
  .compare-footer .flabel { background: var(--surface2); padding: 2px 8px; border-radius: 4px; }
  .zoom-controls { display: flex; align-items: center; gap: 4px; }
  .zbtn {
    width: 24px; height: 24px; border-radius: 5px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: .85rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: border-color .12s;
  }
  .zbtn:hover { border-color: var(--accent); color: var(--accent); }
  .zoom-level { font-size: .72rem; color: var(--muted); min-width: 36px; text-align: center; }

  /* ── TOOLBAR compact ── */
  .toolbar {
    display: flex; align-items: center; gap: 6px;
    flex-wrap: nowrap; overflow-x: auto; padding: 4px 0;
  }
  .toolbar::-webkit-scrollbar { height: 2px; }
  .toolbar-label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; white-space: nowrap; flex-shrink: 0; }
  .toolbar-sep { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; margin: 0 4px; }
  .btn { padding: 3px 10px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: .72rem; cursor: pointer; transition: all .12s; white-space: nowrap; flex-shrink: 0; }
  .btn:hover { border-color: var(--accent); color: var(--text); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .spacer { flex: 1; min-width: 8px; }

  /* ── ITER GRID — large, hauteur mini ── */
  .iter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
  }

  .iter-card {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 7px; overflow: hidden; cursor: pointer;
    transition: border-color .12s;
  }
  .iter-card:hover { border-color: #555; }
  .iter-card.sel-left  { border-color: var(--accent) !important; box-shadow: 0 0 0 1px var(--accent); }
  .iter-card.sel-right { border-color: var(--accent2) !important; box-shadow: 0 0 0 1px var(--accent2); }

  /* ── IN-CARD ZOOM ── */
  .card-img-wrap {
    position: relative; overflow: hidden;
    aspect-ratio: 1; background: #0a0a0f; cursor: crosshair;
  }
  .card-img-wrap img {
    width: 100%; height: 100%; object-fit: contain;
    image-rendering: pixelated; transform-origin: center center;
    transition: transform .05s; pointer-events: none; user-select: none;
  }
  .zoom-hint {
    position: absolute; bottom: 4px; right: 4px;
    background: rgba(0,0,0,.65); color: #aaa; font-size: .55rem;
    padding: 1px 5px; border-radius: 3px; pointer-events: none;
    opacity: 0; transition: opacity .2s;
  }
  .card-img-wrap:hover .zoom-hint { opacity: 1; }
  .sel-badge {
    position: absolute; top: 4px; left: 4px;
    font-size: .6rem; font-weight: 700; padding: 1px 5px;
    border-radius: 3px; pointer-events: none;
  }
  .sel-badge.left  { background: var(--accent); color: #fff; }
  .sel-badge.right { background: var(--accent2); color: #fff; }

  /* Info sous la carte — une seule ligne compacte */
  .iter-info {
    padding: 4px 7px 5px; border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 5px; min-width: 0;
  }
  .iter-info .iter-label {
    font-size: .72rem; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
  }
  .iter-info .iter-tag { flex-shrink: 0; }
  /* masquer params et date dans la carte compacte */
  .iter-info .iter-params,
  .iter-info .iter-time,
  .iter-info .iter-num { display: none; }

  .tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: .65rem; font-weight: 700; margin-right: 3px; }
  .tag-sharpen  { background: #2d3a5a; color: #8ab4f8; }
  .tag-scale2x  { background: #2d4a3a; color: #8af8b4; }
  .tag-denoise  { background: #4a2d3a; color: #f8b48a; }
  .tag-pipeline { background: #3a2d4a; color: #d48af8; }
  .tag-source   { background: #3a3a2d; color: #f8e28a; }

  /* ── DETAIL BAR ── */
  .detail-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
    display: flex; gap: 20px; flex-wrap: wrap;
  }
  .detail-item { display: flex; flex-direction: column; gap: 2px; }
  .detail-item .dl { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .detail-item .dv { font-size: .85rem; font-weight: 700; }

  /* ── DIAGNOSTIC ── */
  .diag-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .diag-panel-header { padding: 9px 14px; border-bottom: 1px solid var(--border); font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
  .diag-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1px; background: var(--border); }
  .diag-cell { background: var(--surface); padding: 9px 12px; }
  .diag-cell .dc-label { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 2px; }
  .diag-cell .dc-value { font-size: .85rem; font-weight: 700; display: block; }
  .diag-cell .dc-level { font-size: .7rem; display: block; margin-top: 1px; }
  .verdict-good,.verdict-ok { color: #6fef9e; }
  .verdict-warning  { color: #f0c040; }
  .verdict-critical { color: #ef6060; }
  .no-diag { padding: 14px; font-size: .8rem; color: var(--muted); }

  /* ── SECTION TITLE / COMPONENT LABEL ── */
  .section-title { font-size: .72rem; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 10px; }

  /* Label discret affiché dans le coin supérieur gauche de chaque composant */
  .comp-wrap { position: relative; }
  .comp-label {
    display: inline-block;
    font-size: .6rem; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); opacity: .55;
    margin-bottom: 6px;
    user-select: none;
  }
  .comp-label::before { content: '─ '; opacity: .4; }

  /* Label intégré dans les headers de cartes */
  .card-comp-name {
    font-size: .58rem; text-transform: uppercase; letter-spacing: .8px;
    color: var(--muted); opacity: .45; margin-left: auto;
    user-select: none;
  }

  /* ── EMPTY STATE ── */
  .empty-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
  .empty-state { text-align: center; color: var(--muted); }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: .88rem; line-height: 1.7; max-width: 380px; }
  .empty-state code { background: var(--surface); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; color: var(--accent); font-size: .8rem; }
</style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar">
  <span class="badge">⚡ Pixel Lab</span>
  <h1>Comparateur d'itérations</h1>
  <span id="header-info">Chargement…</span>
</div>

<!-- ── LAYOUT ── -->
<div class="main-layout">

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <div class="sidebar-header">
    <span>Images source</span>
    <span class="sidebar-count" id="sidebar-count">0</span>
  </div>
  <div class="sidebar-list" id="sidebar-list"></div>
</aside>

<!-- ── CONTENT ── -->
<div class="content" id="content">
  <div class="empty-wrap">
    <div class="empty-state" id="empty-state">
      <div class="icon">🎮</div>
      <p>Lance ton premier traitement pour commencer :</p>
      <p style="margin-top:8px"><code>py scripts/workflow.py inputs/mon_image.png</code></p>
      <p style="margin-top:8px;font-size:.78rem">Puis recharge cette page.</p>
    </div>
  </div>
</div><!-- end content -->
</div><!-- end main-layout -->

<script>
// ─── État global ──────────────────────────────────────────────────────────────
let history = {};
let activeImage = null;
let compareLeft = null;
let compareRight = null;
let sortDesc = true;          // true = plus récent en haut
let filterAlgo = 'all';       // 'all' | 'sharpen' | 'scale2x' | 'denoise'

// ─── Chargement ───────────────────────────────────────────────────────────────
async function loadHistory() {
  try {
    const res = await fetch('../history.json?t=' + Date.now());
    if (!res.ok) throw new Error();
    history = await res.json();
    renderSidebar();
    const keys = Object.keys(history);
    if (keys.length) selectImage(mostRecentIndex());
    updateHeader();
  } catch {
    document.getElementById('header-info').textContent = 'history.json introuvable';
  }
}

function totalRuns() {
  return Object.values(history).reduce((s, v) => s + v.runs.length, 0);
}

function updateHeader() {
  const keys = Object.keys(history);
  document.getElementById('header-info').textContent =
    keys.length + ' image(s) · ' + totalRuns() + ' itération(s)';
}

// ─── Sidebar images ───────────────────────────────────────────────────────────
function lastTimestamp(item) {
  if (!item.runs.length) return '';
  return item.runs[item.runs.length - 1].timestamp || '';
}

function mostRecentIndex() {
  const keys = Object.keys(history);
  if (!keys.length) return 0;
  let best = 0;
  let bestTs = '';
  keys.forEach((name, idx) => {
    const ts = lastTimestamp(history[name]);
    if (ts > bestTs) { bestTs = ts; best = idx; }
  });
  return best;
}

function renderSidebar() {
  const list  = document.getElementById('sidebar-list');
  const count = document.getElementById('sidebar-count');
  const allKeys = Object.keys(history);

  // Trier du plus récent au plus ancien
  const sorted = [...allKeys].sort((a, b) =>
    lastTimestamp(history[b]).localeCompare(lastTimestamp(history[a]))
  );

  count.textContent = allKeys.length;

  list.innerHTML = sorted.map(name => {
    const item = history[name];
    const src  = item.source ? '../' + item.source : '';
    const isActive = name === activeImage;
    const origIdx  = allKeys.indexOf(name);
    const ts = lastTimestamp(item);
    const tsStr = ts ? new Date(ts).toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'}) : '—';
    return `<div class="img-item${isActive ? ' active' : ''}" onclick="selectImage(${origIdx})">
      ${src ? `<img src="${src}" onerror="this.style.display='none'">` : '<div style="width:38px;height:38px;background:var(--surface2);border-radius:5px;flex-shrink:0"></div>'}
      <div class="item-info">
        <div class="item-name">${name}</div>
        <div class="item-meta">${item.runs.length} iter. · ${tsStr}</div>
      </div>
    </div>`;
  }).join('');
}

function selectImage(idx) {
  const keys = Object.keys(history);
  if (idx < 0 || idx >= keys.length) return;
  activeImage = keys[idx];
  compareLeft = null;
  compareRight = null;
  renderSidebar();
  renderContent();
}

// ─── Contenu principal ────────────────────────────────────────────────────────
function renderContent() {
  const content = document.getElementById('content');

  if (!activeImage || !history[activeImage]) {
    content.innerHTML = `<div class="empty-wrap"><div class="empty-state" id="empty-state">
      <div class="icon">🎮</div><p>Sélectionne une image.</p></div></div>`;
    return;
  }

  const item = history[activeImage];

  // Tri + filtre des runs
  let runs = [...item.runs];
  if (filterAlgo !== 'all') runs = runs.filter(r => r.algo === filterAlgo);
  if (sortDesc) runs = runs.slice().reverse();

  // Sélection par défaut : source ↔ dernière itération
  if (!compareLeft && item.source) {
    compareLeft = mkEntry('source', '../' + item.source, 'Source', 'source', 'source', {}, '');
  }
  if (!compareRight && item.runs.length > 0) {
    const r = item.runs[item.runs.length - 1];
    compareRight = mkEntry('run_' + r.index, '../' + r.output, '#' + r.index + ' ' + r.method, r.algo, r.method, r.params, r.timestamp);
  }

  content.innerHTML = `
    <!-- Filtres + Itérations fusionnés -->
    <div class="comp-wrap">
      <div class="comp-label">Filtres &amp; itérations</div>
      <div class="toolbar">
        <button class="btn btn-sort${sortDesc ? ' active' : ''}" onclick="toggleSort()">${sortDesc ? '↓ récent' : '↑ ancien'}</button>
        <div class="toolbar-sep"></div>
        ${['all','sharpen','scale2x','denoise'].map(a =>
          `<button class="btn${filterAlgo===a?' active':''}" onclick="setFilter('${a}')">${a==='all'?'Tous':a}</button>`
        ).join('')}
        <span class="spacer"></span>
        <span style="font-size:.68rem;color:var(--muted);flex-shrink:0">${runs.length} iter.</span>
      </div>

      <div class="iter-grid" id="iter-grid" style="margin-top:8px">
        ${buildSourceCard(item)}
        ${runs.map(r => buildRunCard(r)).join('')}
      </div>
    </div>

    <!-- Comparateur -->
    <div class="comp-wrap">
      <div class="comp-label">Comparateur — glisse le curseur</div>
      ${buildSliderHTML()}
    </div>

    <!-- Détail -->
    <div class="comp-wrap" id="detail-bar-wrap" style="${!compareRight || compareRight.algo==='source' ? 'display:none' : ''}">
      <div class="comp-label">Détail de la sélection droite</div>
      <div id="detail-bar"></div>
    </div>

    <!-- Diagnostic -->
    <div class="comp-wrap">
      <div class="comp-label">Diagnostic qualité</div>
      ${buildDiagHTML(item)}
    </div>
  `;

  updateCompare();
}

// ─── Helpers entrées ──────────────────────────────────────────────────────────
function mkEntry(id, src, label, algo, method, params, ts) {
  return { id, src, label, algo, method, params: params || {}, timestamp: ts };
}

// ─── Cards ────────────────────────────────────────────────────────────────────
function buildSourceCard(item) {
  const src = '../' + item.source;
  const id  = 'source';
  const selClass = compareLeft?.id === id ? 'sel-left' : compareRight?.id === id ? 'sel-right' : '';
  const badge = compareLeft?.id === id ? '<span class="sel-badge left">◀ G</span>'
              : compareRight?.id === id ? '<span class="sel-badge right">D ▶</span>' : '';
  return `<div class="iter-card ${selClass}" onclick="cardClick('source','${src}','Source','source','source',{},'')">
    <div class="card-img-wrap" data-zoom="1" data-px="0" data-py="0"
         onwheel="onZoom(event,this)" onmousedown="zoomDragStart(event,this)" onmousemove="zoomDragMove(event,this)" onmouseup="zoomDragEnd(this)" onmouseleave="zoomDragEnd(this)">
      <img src="${src}" alt="source" draggable="false">
      ${badge}
      <span class="zoom-hint">scroll = zoom</span>
    </div>
    <div class="iter-info">
      <div class="iter-num"><span class="tag tag-source">SOURCE</span></div>
      <div class="iter-label">Original</div>
      <div class="iter-params">Image d'entrée</div>
    </div>
  </div>`;
}

function buildRunCard(run) {
  const src = '../' + run.output;
  const id  = 'run_' + run.index;
  const selClass = compareLeft?.id === id ? 'sel-left' : compareRight?.id === id ? 'sel-right' : '';
  const badge = compareLeft?.id === id ? '<span class="sel-badge left">◀ G</span>'
              : compareRight?.id === id ? '<span class="sel-badge right">D ▶</span>' : '';
  const params = run.params || {};
  const paramStr = Object.entries(params).map(([k,v]) => `${k}=${v}`).join(', ') || '—';
  const ts = run.timestamp ? new Date(run.timestamp).toLocaleString('fr-FR', {dateStyle:'short', timeStyle:'short'}) : '';
  const paramsJSON = JSON.stringify(params).replace(/'/g, "\\'");
  return `<div class="iter-card ${selClass}" onclick="cardClick('${id}','${src}','#${run.index} ${run.method}','${run.algo}','${run.method}',${JSON.stringify(params)},'${ts}')">
    <div class="card-img-wrap" data-zoom="1" data-px="0" data-py="0"
         onwheel="onZoom(event,this)" onmousedown="zoomDragStart(event,this)" onmousemove="zoomDragMove(event,this)" onmouseup="zoomDragEnd(this)" onmouseleave="zoomDragEnd(this)">
      <img src="${src}" alt="iter ${run.index}" draggable="false">
      ${badge}
      <span class="zoom-hint">scroll = zoom · drag = pan</span>
    </div>
    <div class="iter-info">
      <div class="iter-num"><span class="tag tag-${run.algo}">${run.algo.toUpperCase()}</span> #${run.index}</div>
      <div class="iter-label">${run.method}</div>
      <div class="iter-params">${paramStr}</div>
      <div class="iter-time">${ts}</div>
    </div>
  </div>`;
}

// ─── Clic sur une carte ───────────────────────────────────────────────────────
function cardClick(id, src, label, algo, method, params, ts) {
  const entry = mkEntry(id, src, label, algo, method, params, ts);
  const isL = compareLeft?.id  === id;
  const isR = compareRight?.id === id;

  if (isL && isR) { compareLeft = entry; compareRight = null; }
  else if (isL)   { compareLeft = compareRight; compareRight = entry; }
  else if (isR)   { compareRight = compareLeft; compareLeft = entry; }
  else if (!compareLeft)  { compareLeft = entry; }
  else if (!compareRight) { compareRight = compareLeft.id !== id ? entry : null; if (!compareRight) compareLeft = entry; }
  else { compareLeft = compareRight; compareRight = entry; }

  // Jamais les deux identiques
  if (compareLeft?.id === compareRight?.id) compareRight = null;

  refreshGrid();
  updateCompare();
}

function refreshGrid() {
  const item = history[activeImage];
  if (!item) return;
  let runs = [...item.runs];
  if (filterAlgo !== 'all') runs = runs.filter(r => r.algo === filterAlgo);
  if (sortDesc) runs = runs.slice().reverse();
  const grid = document.getElementById('iter-grid');
  if (grid) grid.innerHTML = buildSourceCard(item) + runs.map(r => buildRunCard(r)).join('');
  // Mettre à jour le compteur
  const countEl = document.querySelector('.toolbar .spacer + span');
  if (countEl) countEl.textContent = runs.length + ' iter.';
}

// ─── Sort / Filter ────────────────────────────────────────────────────────────
function toggleSort() { sortDesc = !sortDesc; renderContent(); }
function setFilter(algo) { filterAlgo = algo; renderContent(); }

// ─── Compare slider ───────────────────────────────────────────────────────────
function buildSliderHTML() {
  const ll = compareLeft  ? compareLeft.label  : '—';
  const rl = compareRight ? compareRight.label : '—';
  return `<div class="compare-card">
    <div class="compare-header">
      <label>Gauche :</label>
      <span class="clabel" style="color:var(--accent)">${ll}</span>
      <span style="flex:1"></span>
      <label>Droite :</label>
      <span class="clabel" style="color:var(--accent2)">${rl}</span>
      <span class="card-comp-name">slider</span>
    </div>
    <div class="compare-body" id="cmp-body">
      <div class="cmp-zoom-layer" id="cmp-zoom-layer">
        <img class="img-base" id="cmp-left" src="${compareLeft?.src || ''}" alt="G">
        <div class="img-overlay" id="cmp-overlay" style="width:50%">
          <img id="cmp-right" src="${compareRight?.src || ''}" alt="D">
        </div>
      </div>
      <div class="compare-divider" id="cmp-div" style="left:50%">
        <div class="compare-handle">⇔</div>
      </div>
    </div>
    <div class="compare-footer">
      <span class="flabel" style="color:var(--accent)">${ll}</span>
      <div class="zoom-controls">
        <button class="zbtn" onclick="cmpZoomStep(-1)" title="Dézoomer">−</button>
        <span class="zoom-level" id="cmp-zoom-label">×1</span>
        <button class="zbtn" onclick="cmpZoomStep(+1)" title="Zoomer">+</button>
        <button class="zbtn" onclick="cmpZoomReset()" title="Réinitialiser zoom">↺</button>
      </div>
      <span class="flabel" style="color:var(--accent2)">${rl}</span>
    </div>
  </div>`;
}

function updateCompare() {
  // Reconstruire le slider
  const sliderWrap = document.querySelector('.comp-wrap:has(#cmp-body)') ||
                     [...document.querySelectorAll('.comp-wrap')].find(el => el.querySelector('.compare-card'));
  if (sliderWrap) {
    _sliderSync = null; // reset avant reconstruction
    sliderWrap.innerHTML = `<div class="comp-label">Comparateur — glisse le curseur</div>${buildSliderHTML()}`;
    initSlider();
  }

  // Détail
  const detailWrap = document.getElementById('detail-bar-wrap');
  const detail = document.getElementById('detail-bar');
  if (detail && compareRight && compareRight.algo !== 'source') {
    if (detailWrap) detailWrap.style.display = '';
    const p = Object.entries(compareRight.params||{}).map(([k,v])=>`${k}=${v}`).join(', ')||'—';
    detail.innerHTML = `<div class="detail-bar">
      <div class="detail-item"><span class="dl">Algo</span><span class="dv">${compareRight.algo}</span></div>
      <div class="detail-item"><span class="dl">Méthode</span><span class="dv">${compareRight.method}</span></div>
      <div class="detail-item"><span class="dl">Params</span><span class="dv">${p}</span></div>
      <div class="detail-item"><span class="dl">Date</span><span class="dv">${compareRight.timestamp||'—'}</span></div>
    </div>`;
  } else {
    if (detail) detail.innerHTML = '';
    if (detailWrap) detailWrap.style.display = 'none';
  }
}

// ─── Zoom synchronisé compare ────────────────────────────────────────────────
let cmpZ = 1, cmpPx = 0, cmpPy = 0;
let _sliderSync = null; // callback appelé après chaque changement zoom/pan

function applyCmpZoom() {
  const layer = document.getElementById('cmp-zoom-layer');
  const label = document.getElementById('cmp-zoom-label');
  if (layer) layer.style.transform = `scale(${cmpZ}) translate(${cmpPx}px, ${cmpPy}px)`;
  if (label) label.textContent = cmpZ === 1 ? '×1' : `×${cmpZ.toFixed(1).replace('.0','')}`;
  const body = document.getElementById('cmp-body');
  if (body) body.style.cursor = cmpZ > 1 ? 'grab' : 'crosshair';
  // Resync le divider : sa position visuelle est fixe, l'overlay doit suivre
  if (_sliderSync) _sliderSync();
}

function cmpZoomStep(dir) {
  const steps = [1, 1.5, 2, 3, 4, 6, 8];
  let idx = steps.findIndex(s => s >= cmpZ - 0.05);
  idx = Math.max(0, Math.min(steps.length - 1, idx + dir));
  cmpZ = steps[idx];
  if (cmpZ === 1) { cmpPx = 0; cmpPy = 0; }
  applyCmpZoom();
}

function cmpZoomReset() {
  cmpZ = 1; cmpPx = 0; cmpPy = 0;
  applyCmpZoom();
}

function initSlider() {
  const body    = document.getElementById('cmp-body');
  const overlay = document.getElementById('cmp-overlay');
  const divEl   = document.getElementById('cmp-div');
  const imgR    = document.getElementById('cmp-right');
  if (!body || !overlay || !divEl) return;

  cmpZ = 1; cmpPx = 0; cmpPy = 0;

  // ── Logique divider ──────────────────────────────────────────────────────────
  // divPct = position visuelle du séparateur en fraction du body (0–1).
  // Elle est indépendante du zoom ; c'est l'overlay (dans le zoom layer) qu'on recalcule.
  let divPct = 0.5;

  function applyDivider() {
    const bW = body.getBoundingClientRect().width;
    if (!bW) return;
    const cx = bW / 2;
    // 1. Le divider reste à sa position visuelle body-relative
    divEl.style.left = (divPct * 100) + '%';
    // 2. Convertit la position visuelle en position naturelle dans le zoom layer.
    //    Formule inverse du transform scale(Z) translate(Px,Py) origin:center :
    //    nat_x = (vx - cx) / Z - cmpPx + cx
    const vx = divPct * bW;
    const nat_x = (vx - cx) / cmpZ - cmpPx + cx;
    const pct = Math.max(0.01, Math.min(0.99, nat_x / bW));
    overlay.style.width = (pct * 100) + '%';
    if (imgR) imgR.style.width = (100 / pct) + '%';
  }

  // Expose le sync au zoom global
  _sliderSync = applyDivider;
  applyDivider();

  function setPos(clientX) {
    const rect = body.getBoundingClientRect();
    divPct = Math.max(0.02, Math.min(0.98, (clientX - rect.left) / rect.width));
    applyDivider();
  }

  // ── Divider drag ─────────────────────────────────────────────────────────────
  let divDrag = false;
  divEl.onmousedown = e => { divDrag = true; e.stopPropagation(); e.preventDefault(); };

  // ── Pan drag ─────────────────────────────────────────────────────────────────
  let panDrag = false, panSX = 0, panSY = 0, panOX = 0, panOY = 0;

  body.onmousedown = e => {
    if (cmpZ > 1) {
      panDrag = true;
      panSX = e.clientX; panSY = e.clientY;
      panOX = cmpPx;     panOY = cmpPy;
      body.style.cursor = 'grabbing';
      const layer = document.getElementById('cmp-zoom-layer');
      if (layer) layer.style.transition = 'none';
    }
  };

  document.onmousemove = e => {
    if (divDrag) {
      setPos(e.clientX);
    } else if (panDrag) {
      cmpPx = panOX + (e.clientX - panSX) / cmpZ;
      cmpPy = panOY + (e.clientY - panSY) / cmpZ;
      applyCmpZoom(); // → appelle _sliderSync → applyDivider
    }
  };

  document.onmouseup = () => {
    divDrag = false; panDrag = false;
    body.style.cursor = cmpZ > 1 ? 'grab' : 'crosshair';
    const layer = document.getElementById('cmp-zoom-layer');
    if (layer) layer.style.transition = 'transform 0.08s ease-out';
  };

  // ── Wheel zoom ───────────────────────────────────────────────────────────────
  body.onwheel = e => {
    e.preventDefault();
    const factor = Math.pow(0.95, e.deltaY / 20);
    cmpZ = Math.max(1, Math.min(8, cmpZ * factor));
    if (cmpZ < 1.05) { cmpZ = 1; cmpPx = 0; cmpPy = 0; }
    const layer = document.getElementById('cmp-zoom-layer');
    if (layer) layer.style.transition = 'transform 0.08s ease-out';
    applyCmpZoom();
  };

  // ── Touch ─────────────────────────────────────────────────────────────────────
  body.ontouchstart = e => {
    const layer = document.getElementById('cmp-zoom-layer');
    if (cmpZ > 1) {
      panDrag = true;
      panSX = e.touches[0].clientX; panSY = e.touches[0].clientY;
      panOX = cmpPx;                panOY = cmpPy;
      if (layer) layer.style.transition = 'none';
    } else {
      divDrag = true; setPos(e.touches[0].clientX);
    }
  };
  document.ontouchmove = e => {
    if (divDrag && cmpZ <= 1) setPos(e.touches[0].clientX);
    else if (panDrag) {
      cmpPx = panOX + (e.touches[0].clientX - panSX) / cmpZ;
      cmpPy = panOY + (e.touches[0].clientY - panSY) / cmpZ;
      applyCmpZoom();
    }
  };
  document.ontouchend = () => {
    divDrag = false; panDrag = false;
    const layer = document.getElementById('cmp-zoom-layer');
    if (layer) layer.style.transition = 'transform 0.08s ease-out';
  };
}

// ─── Zoom in-card ─────────────────────────────────────────────────────────────
function applyZoom(wrap) {
  const z  = parseFloat(wrap.dataset.zoom) || 1;
  const px = parseFloat(wrap.dataset.px)   || 0;
  const py = parseFloat(wrap.dataset.py)   || 0;
  const img = wrap.querySelector('img');
  if (img) img.style.transform = `scale(${z}) translate(${px}px, ${py}px)`;
}

function onZoom(e, wrap) {
  e.preventDefault();
  let z = parseFloat(wrap.dataset.zoom) || 1;
  z = Math.max(1, Math.min(8, z + (e.deltaY < 0 ? 0.3 : -0.3)));
  if (z === 1) { wrap.dataset.px = 0; wrap.dataset.py = 0; }
  wrap.dataset.zoom = z;
  applyZoom(wrap);
  wrap.style.cursor = z > 1 ? 'grab' : 'crosshair';
}

function zoomDragStart(e, wrap) {
  const z = parseFloat(wrap.dataset.zoom) || 1;
  if (z <= 1) return;
  e.stopPropagation();
  wrap._drag = true;
  wrap._sx = e.clientX;
  wrap._sy = e.clientY;
  wrap._ox = parseFloat(wrap.dataset.px) || 0;
  wrap._oy = parseFloat(wrap.dataset.py) || 0;
  wrap.style.cursor = 'grabbing';
}

function zoomDragMove(e, wrap) {
  if (!wrap._drag) return;
  e.stopPropagation();
  const z = parseFloat(wrap.dataset.zoom) || 1;
  const dx = (e.clientX - wrap._sx) / z;
  const dy = (e.clientY - wrap._sy) / z;
  wrap.dataset.px = wrap._ox + dx;
  wrap.dataset.py = wrap._oy + dy;
  applyZoom(wrap);
}

function zoomDragEnd(wrap) {
  wrap._drag = false;
  const z = parseFloat(wrap.dataset.zoom) || 1;
  wrap.style.cursor = z > 1 ? 'grab' : 'crosshair';
}

// ─── Diagnostic ───────────────────────────────────────────────────────────────
function buildDiagHTML(item) {
  const d = item.last_diagnosis;
  if (!d) return `<div class="diag-panel"><div class="no-diag">Pas de diagnostic — lance <code>py scripts/diagnose.py inputs/image.png --save</code></div></div>`;
  const m = d.metrics;
  const ICONS = { good:'✅', ok:'✅', warning:'⚠️', critical:'🔴' };
  const cell = (label, val, level, verdict) =>
    `<div class="diag-cell">
      <span class="dc-label">${ICONS[verdict]||''} ${label}</span>
      <span class="dc-value verdict-${verdict}">${val}</span>
      <span class="dc-level verdict-${verdict}">${level}</span>
    </div>`;
  return `<div class="diag-panel">
    <div class="diag-panel-header" style="display:flex;justify-content:space-between;align-items:center">
      <span>🔍 Analysé le ${new Date(d.timestamp).toLocaleString('fr-FR', {dateStyle:'short',timeStyle:'short'})}</span>
      <span class="card-comp-name">diagnostic</span>
    </div>
    <div class="diag-grid">
      ${cell('Flou',          `score ${m.blur?.score??'—'}`,             m.blur?.level??'—',           m.blur?.verdict??'ok')}
      ${cell('JPEG',          `ratio ${m.jpeg_artifacts?.score??'—'}`,   m.jpeg_artifacts?.level??'—', m.jpeg_artifacts?.verdict??'ok')}
      ${cell('Interpolation', `${m.interpolation?.score??'—'}%`,         m.interpolation?.level??'—',  m.interpolation?.verdict??'ok')}
      ${cell('Bruit',         `σ=${m.noise?.score??'—'}`,                m.noise?.level??'—',          m.noise?.verdict??'ok')}
      ${cell('Palette',       `${m.palette?.count??'—'} couleurs`,       m.palette?.level??'—',        m.palette?.verdict??'ok')}
      ${cell('Pixel ×',       `×${m.pixel_block?.pixel_size??1}`,        m.pixel_block?.level??'—',    'ok')}
    </div>
  </div>`;
}

// ─── Auto-refresh 5s ──────────────────────────────────────────────────────────
setInterval(async () => {
  try {
    const res = await fetch('../history.json?t=' + Date.now());
    if (!res.ok) return;
    const h2 = await res.json();
    if (Object.values(h2).reduce((s,v)=>s+v.runs.length,0) !== totalRuns()) {
      history = h2;
      renderSidebar();
      if (activeImage && history[activeImage]) renderContent();
      else if (Object.keys(history).length) selectImage(0);
      updateHeader();
    }
  } catch {}
}, 5000);

// ─── Init ─────────────────────────────────────────────────────────────────────
loadHistory();
